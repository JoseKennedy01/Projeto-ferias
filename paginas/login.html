<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../estilos/login.css">
    <link rel="shortcut icon" href="../imagens/favicon.png" type="image/x-icon">
</head>
<body>
    <main>
        <form class="login-caixa" action="#" method="post">
            <h1>FITNESS STOK</h1>
            <div class="linha-dest"></div>
            <p class="subtitulo">Acesse sua conta</p>

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="seuemail@gmail.com" required>

            <label for="senha">Senha</label>
            <input type="password" id="senha" name="senha" placeholder="Sua senha" required minlength="8" maxlength="20">

            <button type="submit">Entrar</button>

            <p class="cadastro-msg">Ainda não tem uma conta? <a href="cadastro.html">Criar conta</a></p>

            <a href="../principal.html" class="voltar">&larr; Voltar pra loja</a>
        </form>
    </main>
</body>
</html>
